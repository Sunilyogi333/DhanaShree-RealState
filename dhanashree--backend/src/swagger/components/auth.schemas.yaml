components:
  schemas:
    LoginDTO:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          example: 'admin123'

    ResetForgotPasswordInput:
      type: object
      required:
        - token
        - email
        - password
      properties:
        token:
          type: string
          example: 'jwt_token_here'
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          example: 'newpassword123'

    UpdatePasswordDTO:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
          example: 'oldpassword123'
        newPassword:
          type: string
          example: 'newpassword456'

    VerifyResetEmailDTO:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
